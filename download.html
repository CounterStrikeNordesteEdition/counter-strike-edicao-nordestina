<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando Download | Counter-Strike: Edição Nordestina</title>
    <script src="https://pl30226814.effectivecpmnetwork.com/ac/44/a6/ac44a649ba1a1553cd494bd4a02d70e9.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #050505 url('background-canal.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(18, 25, 13, 0.9);
            border: 2px solid #5c8a1a;
            border-radius: 12px;
            padding: 40px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 0 30px rgba(92, 138, 26, 0.3);
        }

        .icon {
            font-size: 50px;
            color: #8ce600;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .status-text {
            color: #a0a0a0;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .countdown {
            font-size: 54px;
            font-weight: bold;
            color: #8ce600;
            margin: 20px 0;
            text-shadow: 0 0 15px rgba(140, 230, 0, 0.4);
        }

        .btn-download {
            display: none;
            background: linear-gradient(135deg, #76b318 0%, #5c8a1a 100%);
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            border: 1px solid #8ce600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin: 10px 0;
            width: 100%;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(140, 230, 0, 0.4);
            background: linear-gradient(135deg, #8ce600 0%, #76b318 100%);
        }

        .btn-drive {
            background: linear-gradient(135deg, #1da1f2 0%, #0d8bd9 100%);
            border-color: #4dc2ff;
        }
        .btn-drive:hover {
            background: linear-gradient(135deg, #4dc2ff 0%, #1da1f2 100%);
            box-shadow: 0 6px 20px rgba(29, 161, 242, 0.4);
        }

        .ad-placeholder {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛡️</div>
        <h1>Verificando Arquivo</h1>
        <p class="status-text" id="status-message">Por favor, aguarde enquanto preparamos seu link seguro...</p>

        <div class="countdown" id="timer">15</div>

        <a href="https://www.mediafire.com/file/0b6jayix78xu816/Counter_Strike_Brasil.rar/file">📥 Baixar via MediaFire</a>
        <a href="https://drive.google.com/drive/folders/1c0ghAGnSHMINhqB16T1cKCJQ1sIYc0Mu?usp=drive_link" target="_blank">🤖 Baixar via Google Drive</a>

        <div class="ad-placeholder">
            <span style="display:block; font-size:10px; margin-bottom:5px;">Ad</span>
            Anúncio Patrocinado
        </div>
    </div>

    <script>
        // Configuração do Tempo de Espera (15 segundos)
        let timeLeft = 15;
        const timerElement = document.getElementById('timer');
        const statusMessage = document.getElementById('status-message');
        const btnMediafire = document.getElementById('btn-mediafire');
        const btnDrive = document.getElementById('btn-drive');

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.style.display = 'none';
                statusMessage.textContent = 'Arquivo verificado com sucesso! Escolha um servidor abaixo para baixar:';
                
                // Exibe os botões de download
                btnMediafire.style.display = 'block';
                btnDrive.style.display = 'block';
            }
        }, 1000);
    </script>
</body>
</html>
